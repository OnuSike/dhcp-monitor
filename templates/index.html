<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DHCP Monitor</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { color: #00d4ff; }
        h2 { color: #00d4ff; margin-top: 30px; }

        /* Grid */
        .subnet-block { margin-bottom: 40px; }
        .grid { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
        .ip-block {
            width: 30px; height: 30px; border-radius: 4px;
            cursor: pointer; position: relative;
        }
        .ip-block.free { background: #00ff88; opacity: 0.3; }
        .ip-block.leased { background: #ff4444; }
        .ip-block.suspicious { background: #ffcc00; }
        .tooltip {
            display: none; position: absolute; z-index: 10;
            background: #16213e; border: 1px solid #00d4ff;
            padding: 8px; border-radius: 4px; font-size: 12px;
            white-space: nowrap; top: 35px; left: 0;
        }
        .ip-block:hover .tooltip { display: block; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #16213e; color: #00d4ff; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #333; }
        tr:hover { background: #16213e; }
        .active { color: #00ff88; }
        .expired { color: #ff4444; }

        .stats { color: #aaa; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>DHCP Monitor</h1>

    <h2>Pool Visualizer</h2>
    <div id="pool-grid"></div>

    <h2>Active Leases</h2>
    <p>Total: <span id="count">0</span></p>
    <table>
        <thead>
            <tr>
                <th>IP Address</th>
                <th>MAC Address</th>
                <th>Hostname</th>
                <th>Expiry</th>
                <th>Last Seen</th>
            </tr>
        </thead>
        <tbody id="lease-table"></tbody>
    </table>

    <h2>Alerts</h2>
    <table>
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Attack Type</th>
                <th>Description</th>
                <th>Source IP</th>
                <th>Source MAC</th>
            </tr>
        </thead>
        <tbody id="alerts-table"></tbody>
    </table>

    <script>
        function loadPool() {
            fetch('/api/pool')
                .then(r => r.json())
                .then(subnets => {
                    const container = document.getElementById('pool-grid');
                    container.innerHTML = '';
                    subnets.forEach(subnet => {
                        const leased = subnet.ips.filter(i => i.leased).length;
                        const total = subnet.ips.length;
                        const div = document.createElement('div');
                        div.className = 'subnet-block';
                        div.innerHTML = `
                            <strong>${subnet.network}</strong>
                            <div class="stats">${leased} / ${total} IPs leased (${Math.round(leased/total*100)}%)</div>
                            <div class="grid" id="grid-${subnet.network.replace(/\//g, '-')}"></div>
                        `;
                        container.appendChild(div);

                        const grid = div.querySelector('.grid');
                        subnet.ips.forEach(ip => {
                            const block = document.createElement('div');
                            const status = ip.leased ? (ip.suspicious ? 'suspicious' : 'leased') : 'free';
                            block.className = `ip-block ${status}`;
                            block.innerHTML = `
                                <div class="tooltip">
                                    <strong>${ip.ip}</strong><br>
                                    ${ip.leased ? `MAC: ${ip.mac}<br>Host: ${ip.hostname || '-'}<br>Expiry: ${ip.expiry}` : 'Free'}
                                </div>
                            `;
                            grid.appendChild(block);
                        });
                    });
                });
        }

        function loadLeases() {
            fetch('/api/leases')
                .then(r => r.json())
                .then(leases => {
                    document.getElementById('count').textContent = leases.length;
                    const tbody = document.getElementById('lease-table');
                    tbody.innerHTML = '';
                    leases.forEach(l => {
                        const expiry = new Date(l.expiry);
                        const expired = expiry < new Date();
                        tbody.innerHTML += `<tr>
                            <td>${l.ip}</td>
                            <td>${l.mac}</td>
                            <td>${l.hostname || '-'}</td>
                            <td class="${expired ? 'expired' : 'active'}">${l.expiry}</td>
                            <td>${l.last_seen}</td>
                        </tr>`;
                    });
                });
        }

        function loadAlerts() {
            fetch('/api/alerts')
                .then(r => r.json())
                .then(alerts => {
                    const tbody = document.getElementById('alerts-table');
                    tbody.innerHTML = '';
                    if (alerts.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="color:#aaa">No alerts</td></tr>';
                        return;
                    }
                    alerts.forEach(a => {
                        tbody.innerHTML += `<tr>
                            <td>${a.timestamp}</td>
                            <td style="color:#ff4444">${a.attack_type}</td>
                            <td>${a.description}</td>
                            <td>${a.source_ip || '-'}</td>
                            <td>${a.source_mac || '-'}</td>
                        </tr>`;
                    });
                });
        }

        loadPool();
        loadLeases();
        loadAlerts();
        setInterval(() => { loadPool(); loadLeases(); loadAlerts(); }, 5000);
    </script>
</body>
</html>
